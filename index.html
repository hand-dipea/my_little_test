<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전사 UX 라이팅 봇</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Import Map for React and Lucide Icons -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>

  <style>
    /* 커스텀 폰트 및 기본 스타일 설정 */
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body {
      font-family: 'Pretendard', sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Bot, Copy, CheckCircle2, Loader2, Sparkles, MessageSquare, AlertCircle, Type, Edit3, AlertTriangle, Wand2, CornerDownRight, Send } from 'lucide-react';

    function App() {
      const [usageType, setUsageType] = useState('push');
      const [customUsage, setCustomUsage] = useState('');
      const [tone, setTone] = useState('friendly');
      const [coreMessage, setCoreMessage] = useState('');
      const [isGenerating, setIsGenerating] = useState(false);
      const [results, setResults] = useState(null);
      const [copiedIndex, setCopiedIndex] = useState(null);
      const [errorMsg, setErrorMsg] = useState(null);

      // 추가 다듬기(디벨롭) 기능을 위한 상태값
      const [activeRefineIndex, setActiveRefineIndex] = useState(null);
      const [refinePrompt, setRefinePrompt] = useState('');
      const [isRefiningIndex, setIsRefiningIndex] = useState(null);

      const usageLabels = {
        push: '앱 푸시/알림',
        error: '에러/경고창',
        tooltip: '툴팁/안내',
        other: '기타 (직접 입력)'
      };

      const toneLabels = {
        friendly: '친근하고 부드럽게',
        polite: '정중하고 신뢰감 있게',
        clear: '건조하지만 명확하게'
      };

      // 재시도 로직이 포함된 API 호출 함수
      const fetchWithRetry = async (url, options, retries = 5) => {
        const delays = [1000, 2000, 4000, 8000, 16000];
        for (let i = 0; i < retries; i++) {
          try {
            const response = await fetch(url, options);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return await response.json();
          } catch (err) {
            if (i === retries - 1) throw err;
            await new Promise(res => setTimeout(res, delays[i]));
          }
        }
      };

      // 실제 AI 문구 생성 로직
      const generateAIResults = async () => {
        if (coreMessage.trim() === '') return;
        if (usageType === 'other' && customUsage.trim() === '') {
          setErrorMsg('기타 사용처를 입력해주세요.');
          return;
        }

        setIsGenerating(true);
        setResults(null);
        setErrorMsg(null);

        // 주의: GitHub Pages 배포 시 여기에 발급받은 API 키를 입력하세요.
        // 클라이언트 코드에 키가 노출되므로, 실제 운영 환경에서는 주의가 필요합니다.
        const apiKey = ""; 
        
        if (!apiKey) {
           setErrorMsg('API 키가 설정되지 않았습니다. 소스 코드에 Gemini API 키를 입력해주세요.');
           setIsGenerating(false);
           return;
        }

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

        const actualUsage = usageType === 'other' ? customUsage : usageLabels[usageType];
        const actualTone = toneLabels[tone];

        const systemInstruction = `너는 10년 차 IT 기업의 수석 UX 라이터야. 
        사용자가 상황을 주면 아래의 원칙에 따라 최적의 UI/UX 문구를 3가지 다른 옵션으로 제안해 줘.
        [작성 원칙]
        1. 명확성: 전문 용어나 시스템 언어를 배제하고 중학생도 이해할 수 있는 쉬운 단어를 쓴다.
        2. 간결성: 불필요한 조사와 수식어를 빼고 목적만 짧게 전달한다.
        3. 긍정성: 유저의 잘못을 지적하지 않고, 해결 방법을 안내한다.`;

        const prompt = `다음 상황에 맞는 UX 문구를 작성해주세요.
        - 사용처: ${actualUsage}
        - 톤앤매너: ${actualTone}
        - 전달할 핵심 내용: ${coreMessage}`;

        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          systemInstruction: { parts: [{ text: systemInstruction }] },
          generationConfig: {
            responseMimeType: "application/json",
            responseSchema: {
              type: "ARRAY",
              items: {
                type: "OBJECT",
                properties: {
                  title: { type: "STRING", description: "옵션 이름 (예: A. 직관성 위주)" },
                  text: { type: "STRING", description: "작성된 UX 라이팅 문구" },
                  reason: { type: "STRING", description: "이 문구를 추천하는 이유 (1~2줄)" }
                },
                required: ["title", "text", "reason"]
              }
            }
          }
        };

        try {
          const data = await fetchWithRetry(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (responseText) {
            const parsedResults = JSON.parse(responseText);
            setResults(parsedResults);
          } else {
            throw new Error('응답 결과가 없습니다.');
          }
        } catch (error) {
          console.error('Generation Error:', error);
          setErrorMsg('AI 응답을 가져오는 중 문제가 발생했습니다. 잠시 후 다시 시도해주세요.');
        } finally {
          setIsGenerating(false);
        }
      };

      // 특정 옵션만 다듬기 (디벨롭) 로직
      const refineAIResult = async (index, currentText) => {
        if (refinePrompt.trim() === '') return;

        setIsRefiningIndex(index);
        setErrorMsg(null);

        const apiKey = ""; // 런타임 환경에서 자동 주입됨 (GitHub 호스팅시 위에 입력한 키와 동일하게 설정 필요)
        
        if (!apiKey) {
           setErrorMsg('API 키가 설정되지 않았습니다. 소스 코드에 Gemini API 키를 입력해주세요.');
           setIsRefiningIndex(null);
           return;
        }

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

        const systemInstruction = `너는 10년 차 IT 기업의 수석 UX 라이터야. 
        기존에 작성된 UX 라이팅 문구를 사용자의 추가 요청에 맞게 다듬어줘.`;

        const prompt = `[기존 문구]
        ${currentText}

        [추가 요청]
        ${refinePrompt}

        위 요청을 반영하여 기존 문구를 새롭게 다듬어서 1개만 제안해 줘. 기존 문구의 좋은 점은 유지하되 추가 요청사항을 최우선으로 반영해.`;

        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          systemInstruction: { parts: [{ text: systemInstruction }] },
          generationConfig: {
            responseMimeType: "application/json",
            responseSchema: {
              type: "OBJECT",
              properties: {
                text: { type: "STRING", description: "수정된 UX 라이팅 문구" },
                reason: { type: "STRING", description: "수정한 이유 (1~2줄)" }
              },
              required: ["text", "reason"]
            }
          }
        };

        try {
          const data = await fetchWithRetry(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (responseText) {
            const parsedResult = JSON.parse(responseText);
            setResults(prevResults => {
              const newResults = [...prevResults];
              // 기존 제목(예: A안)은 유지하고 내용과 추천 이유만 덮어씌움
              newResults[index] = {
                ...newResults[index],
                text: parsedResult.text,
                reason: parsedResult.reason,
              };
              return newResults;
            });
            setActiveRefineIndex(null);
            setRefinePrompt('');
          } else {
            throw new Error('응답 결과가 없습니다.');
          }
        } catch (error) {
          console.error('Refine Error:', error);
          setErrorMsg('추가 다듬기 중 문제가 발생했습니다. 잠시 후 다시 시도해주세요.');
        } finally {
          setIsRefiningIndex(null);
        }
      };

      const copyToClipboard = (text, index) => {
        try {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          textArea.style.position = "fixed";
          textArea.style.left = "-999999px";
          textArea.style.top = "-999999px";
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          document.execCommand('copy');
          textArea.remove();
          
          setCopiedIndex(index);
          setTimeout(() => setCopiedIndex(null), 2000);
        } catch (error) {
          console.error('Copy failed', error);
          setErrorMsg('클립보드 복사에 실패했습니다. 문구를 직접 드래그해서 복사해주세요.');
        }
      };

      return (
        <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans text-gray-800">
          {/* 헤더 */}
          <header className="max-w-5xl mx-auto mb-8 flex items-center gap-3">
            <div className="bg-blue-600 p-2.5 rounded-xl text-white shadow-sm">
              <Bot size={28} />
            </div>
            <div>
              <h1 className="text-2xl font-bold text-gray-900 tracking-tight">전사 UX 라이팅 봇</h1>
              <p className="text-sm text-gray-500 mt-1">기획, 디자인, 개발 누구나 쓰는 우리 회사 브랜드 보이스</p>
            </div>
          </header>

          <main className="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            {/* 왼쪽 패널: 입력 폼 */}
            <section className="lg:col-span-5 bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col h-fit">
              <h2 className="text-lg font-semibold mb-6 flex items-center gap-2">
                <MessageSquare size={20} className="text-blue-500" />
                무엇을 도와드릴까요?
              </h2>

              <div className="space-y-6">
                {/* 1. 사용처 */}
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-3">1. 어디에 쓰이는 문구인가요?</label>
                  <div className="grid grid-cols-2 gap-2">
                    {[
                      { id: 'push', label: '앱 푸시/알림', icon: <Sparkles size={16} /> },
                      { id: 'error', label: '에러/경고창', icon: <AlertCircle size={16} /> },
                      { id: 'tooltip', label: '툴팁/안내', icon: <Type size={16} /> },
                      { id: 'other', label: '기타', icon: <Edit3 size={16} /> },
                    ].map((item) => (
                      <button
                        key={item.id}
                        onClick={() => {
                          setUsageType(item.id);
                          if (item.id !== 'other') setCustomUsage('');
                        }}
                        className={`flex items-center gap-2 p-3 text-sm rounded-xl border transition-all ${
                          usageType === item.id 
                            ? 'border-blue-500 bg-blue-50 text-blue-700 font-medium' 
                            : 'border-gray-200 hover:border-blue-200 hover:bg-gray-50 text-gray-600'
                        }`}
                      >
                        {item.icon}
                        {item.label}
                      </button>
                    ))}
                  </div>
                  {/* 주관식 입력 폼 */}
                  {usageType === 'other' && (
                    <div className="mt-3 animate-in fade-in slide-in-from-top-2 duration-300">
                      <input
                        type="text"
                        value={customUsage}
                        onChange={(e) => setCustomUsage(e.target.value)}
                        placeholder="어떤 화면/상황에서 쓰이나요? (예: 결제 완료 화면)"
                        className="w-full p-3 border border-gray-300 rounded-xl bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm transition-all"
                        autoFocus
                      />
                    </div>
                  )}
                </div>

                {/* 2. 톤앤매너 */}
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-3">2. 어떤 톤앤매너를 원하시나요?</label>
                  <div className="flex flex-wrap gap-2">
                    {[
                      { id: 'friendly', label: '친근하고 부드럽게' },
                      { id: 'polite', label: '정중하고 신뢰감 있게' },
                      { id: 'clear', label: '건조하지만 명확하게' }
                    ].map((t) => (
                      <button
                        key={t.id}
                        onClick={() => setTone(t.id)}
                        className={`px-4 py-2 text-sm rounded-full border transition-all ${
                          tone === t.id 
                            ? 'border-blue-500 bg-blue-50 text-blue-700 font-medium' 
                            : 'border-gray-200 hover:bg-gray-50 text-gray-600'
                        }`}
                      >
                        {t.label}
                      </button>
                    ))}
                  </div>
                </div>

                {/* 3. 핵심 내용 */}
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">3. 유저에게 꼭 전달해야 할 핵심 내용</label>
                  <textarea
                    value={coreMessage}
                    onChange={(e) => setCoreMessage(e.target.value)}
                    placeholder="예) 결제 시도 중 카드 잔액이 부족해서 실패했음. 다른 카드로 결제하거나 잔액을 채워달라고 안내해야 함."
                    className="w-full p-4 border border-gray-200 rounded-xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none resize-none h-32 text-sm leading-relaxed"
                  ></textarea>
                </div>

                {/* 에러 메시지 */}
                {errorMsg && (
                  <div className="p-3 bg-red-50 text-red-600 text-sm rounded-xl flex gap-2 items-center">
                    <AlertTriangle size={16} className="shrink-0" />
                    <span>{errorMsg}</span>
                  </div>
                )}

                {/* 생성 버튼 */}
                <button
                  onClick={generateAIResults}
                  disabled={isGenerating || coreMessage.trim() === ''}
                  className={`w-full py-4 rounded-xl font-bold text-white flex justify-center items-center gap-2 transition-all ${
                    isGenerating || coreMessage.trim() === '' 
                      ? 'bg-blue-300 cursor-not-allowed' 
                      : 'bg-blue-600 hover:bg-blue-700 hover:shadow-lg hover:-translate-y-0.5'
                  }`}
                >
                  {isGenerating ? (
                    <>
                      <Loader2 size={20} className="animate-spin" />
                      AI가 최적의 문구를 작성 중이에요...
                    </>
                  ) : (
                    <>
                      <Sparkles size={20} />
                      UX 문구 생성하기
                    </>
                  )}
                </button>
              </div>
            </section>

            {/* 오른쪽 패널: 결과 화면 */}
            <section className="lg:col-span-7 bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col overflow-hidden min-h-[500px]">
              <div className="p-6 border-b border-gray-100 bg-gray-50/50">
                <h2 className="text-lg font-semibold text-gray-800">AI 제안 결과</h2>
                <p className="text-sm text-gray-500 mt-1">입력된 상황과 톤앤매너에 맞춘 3가지 옵션입니다.</p>
              </div>

              <div className="p-6 flex-1 bg-slate-50 overflow-y-auto">
                {!results && !isGenerating && !errorMsg && (
                  <div className="h-full flex flex-col items-center justify-center text-gray-400 space-y-4 py-12">
                    <Bot size={48} className="opacity-20" />
                    <p>좌측 폼을 작성하고 생성 버튼을 눌러주세요.</p>
                  </div>
                )}

                {isGenerating && (
                  <div className="h-full flex flex-col items-center justify-center text-blue-500 space-y-4 py-12">
                    <Loader2 size={40} className="animate-spin" />
                    <p className="font-medium animate-pulse">상황을 분석하고 문구를 작성하고 있습니다...</p>
                  </div>
                )}

                {results && !isGenerating && (
                  <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    {results.map((result, index) => (
                      <div key={index} className="bg-white border border-gray-200 rounded-xl p-5 hover:border-blue-300 hover:shadow-md transition-all group relative">
                        <div className="flex justify-between items-start mb-2">
                          <span className="inline-block px-3 py-1 bg-blue-50 text-blue-700 text-xs font-bold rounded-lg">
                            {result.title}
                          </span>
                          <button 
                            onClick={() => copyToClipboard(result.text, index)}
                            className="text-gray-400 hover:text-blue-600 transition-colors p-1 flex items-center gap-1 text-sm bg-gray-50 hover:bg-blue-50 rounded-md"
                          >
                            {copiedIndex === index ? (
                              <><CheckCircle2 size={16} className="text-green-500"/> <span className="text-green-600 font-medium">복사됨!</span></>
                            ) : (
                              <><Copy size={16} /> <span>복사</span></>
                            )}
                          </button>
                        </div>
                        
                        <div className="py-3">
                          <p className="text-lg text-gray-900 font-medium whitespace-pre-line leading-relaxed">
                            {result.text}
                          </p>
                        </div>

                        <div className="mt-2 pt-3 border-t border-gray-100 flex items-start gap-2">
                      <Sparkles size={14} className="text-amber-500 mt-0.5 shrink-0" />
                      <p className="text-sm text-gray-500">
                        <strong className="text-gray-700 font-medium">추천 이유: </strong> 
                        {result.reason}
                      </p>
                    </div>

                    {/* 추가 다듬기(디벨롭) 영역 */}
                    <div className="mt-4 pt-3 border-t border-dashed border-gray-200">
                      {activeRefineIndex !== index ? (
                        <button
                          onClick={() => {
                            setActiveRefineIndex(index);
                            setRefinePrompt('');
                          }}
                          className="flex items-center gap-1.5 text-sm text-gray-500 hover:text-blue-600 transition-colors"
                        >
                          <Wand2 size={14} />
                          <span>이 문구 다듬기 (추가 요청)</span>
                        </button>
                      ) : (
                        <div className="flex flex-col gap-2 animate-in fade-in slide-in-from-top-2 duration-300">
                          <div className="flex items-center gap-2">
                            <CornerDownRight size={16} className="text-gray-400" />
                            <input
                              type="text"
                              value={refinePrompt}
                              onChange={(e) => setRefinePrompt(e.target.value)}
                              placeholder="예) 좀 더 길게 만들어줘, 유머러스하게 바꿔줘"
                              className="flex-1 p-2 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none bg-gray-50"
                              onKeyDown={(e) => {
                                if (e.key === 'Enter') refineAIResult(index, result.text);
                              }}
                              autoFocus
                            />
                            <button
                              onClick={() => refineAIResult(index, result.text)}
                              disabled={isRefiningIndex === index || refinePrompt.trim() === ''}
                              className={`p-2 rounded-lg flex items-center justify-center transition-all ${
                                isRefiningIndex === index || refinePrompt.trim() === ''
                                  ? 'bg-gray-100 text-gray-400'
                                  : 'bg-blue-600 text-white hover:bg-blue-700'
                              }`}
                            >
                              {isRefiningIndex === index ? <Loader2 size={16} className="animate-spin" /> : <Send size={16} />}
                            </button>
                            <button
                              onClick={() => setActiveRefineIndex(null)}
                              className="text-xs text-gray-500 hover:text-gray-700 px-2 shrink-0"
                            >
                              취소
                            </button>
                          </div>
                        </div>
                      )}
                    </div>

                    {/* 해당 옵션만 다듬을 때 보여주는 로딩 오버레이 */}
                    {isRefiningIndex === index && (
                      <div className="absolute inset-0 bg-white/70 backdrop-blur-[1px] rounded-xl flex items-center justify-center z-10">
                         <div className="flex flex-col items-center gap-3 text-blue-600">
                           <Loader2 size={28} className="animate-spin" />
                           <span className="text-sm font-medium bg-white px-3 py-1 rounded-full shadow-sm">
                             요청을 반영하여 다듬는 중...
                           </span>
                         </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
              </div>
            </section>

          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
