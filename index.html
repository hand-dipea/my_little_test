<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>무무즈 상품 옵션 UI 개선 프로토타입</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 스크롤바 숨김 처리용 유틸 (선택사항) */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* 아코디언 애니메이션용 */
    .accordion-content {
      transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
    }
    .accordion-content.open {
      max-height: 300px;
      opacity: 1;
    }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script>
    // --- [1. 데이터 및 초기 상태 셋팅] ---
    const MOCK_DATA = {
      general: {
        stockData: [
          { color: 'Ivory', size: '80', stock: 5 }, { color: 'Ivory', size: '90', stock: 10 },
          { color: 'Ivory', size: '100', stock: 0 }, { color: 'Ivory', size: '110', stock: 2 },
          { color: 'Pink', size: '80', stock: 0 }, { color: 'Pink', size: '90', stock: 0 },
          { color: 'Pink', size: '100', stock: 5 }, { color: 'Pink', size: '110', stock: 5 },
          { color: 'Navy', size: '80', stock: 10 }, { color: 'Navy', size: '90', stock: 10 },
          { color: 'Navy', size: '100', stock: 10 }, { color: 'Navy', size: '110', stock: 10 },
        ],
        colors: [
          { name: 'Ivory', hex: '#fffff0' }, { name: 'Pink', hex: '#ffc0cb' }, { name: 'Navy', hex: '#000080' }
        ],
        sizes: ['80', '90', '100', '110']
      },
      set: [
        { id: 1, name: '베어 세트 (아이보리 상의 + 네이비 하의)', price: 19900, stock: 10 },
        { id: 2, name: '토끼 세트 (핑크 상의 + 아이보리 하의)', price: 19900, stock: 0 },
        { id: 3, name: '폭스 세트 (네이비 상의 + 네이비 하의)', price: 19900, stock: 5 },
      ],
      bottomsheet: {
        stockData: [
          { color: 'Pink', size: '80', stock: 5 }, { color: 'Pink', size: '90', stock: 0 }, { color: 'Pink', size: '100', stock: 10 },
          { color: 'Blue', size: '80', stock: 0 }, { color: 'Blue', size: '90', stock: 5 }, { color: 'Blue', size: '100', stock: 5 },
          { color: 'Navy', size: '80', stock: 10 }, { color: 'Navy', size: '90', stock: 10 }, { color: 'Navy', size: '100', stock: 10 },
        ],
        sizes: ['80', '90', '100'],
        colors: [
          { name: 'Pink', hex: '#ffc0cb' }, { name: 'Blue', hex: '#add8e6' }, { name: 'Navy', hex: '#000080' }
        ]
      },
      accordion: {
        stockData: [
          { color: '아이보리', size: '90', stock: 5 }, { color: '아이보리', size: '100', stock: 10 }, { color: '아이보리', size: '110', stock: 10 },
          { color: '블루', size: '90', stock: 10 }, { color: '블루', size: '100', stock: 0 }, { color: '블루', size: '110', stock: 10 },
          { color: '올리브그린', size: '90', stock: 0 }, { color: '올리브그린', size: '100', stock: 0 }, { color: '올리브그린', size: '110', stock: 0 },
        ],
        sizes: ['90', '100', '110'],
        colors: [
          { name: '아이보리' }, { name: '블루' }, { name: '올리브그린' }
        ]
      }
    };

    const TABS = [
      { id: 'general', label: '1. 일반옵션 (색상/사이즈)' },
      { id: 'set', label: '2. 세트상품' },
      { id: 'text', label: '3. 텍스트옵션' },
      { id: 'single', label: '4. 단일/예약' },
      { id: 'bottomsheet', label: '5. 바텀시트(Chip)' },
      { id: 'accordion', label: '6. 현실개선(아코디언)' },
    ];

    let state = {
      activeTab: 'accordion', 
      general: { size: null, color: null },
      set: { isOpen: false, selectedId: null },
      text: { text: '', qty: 2 },
      single: { qty: 1 },
      bottomsheet: { isOpen: false, size: null, color: null, items: [] },
      accordion: { isOpen: false, activeDropdown: null, color: null, size: null, items: [] }
    };

    // --- [2. 액션 핸들러] ---
    window.actions = {
      setTab: (id) => { state.activeTab = id; render(); },

      // (일반옵션 등 다른 탭 핸들러 생략, 구조 유지)
      gSelectSize: (size) => { state.general.size = state.general.size === size ? null : size; render(); },
      gSelectColor: (color) => { state.general.color = state.general.color === color ? null : color; render(); },
      gResetSize: () => { state.general.size = null; render(); },
      gResetColor: () => { state.general.color = null; render(); },
      gComplete: () => { alert(`${state.general.color} / ${state.general.size} 사이즈 옵션이 추가되었습니다.`); state.general.color = null; state.general.size = null; render(); },
      toggleSetMenu: () => { state.set.isOpen = !state.set.isOpen; render(); },
      selectSet: (id) => { state.set.selectedId = id; state.set.isOpen = false; render(); },
      onTextInput: (val) => { state.text.text = val; document.getElementById('text-counter').innerText = `${val.length} / 10자`; },
      textQty: (delta) => { let n = state.text.qty + delta; if (n < 2 || n > 5) return; state.text.qty = n; render(); },
      singleQty: (delta) => { if(state.single.qty + delta > 0) state.single.qty += delta; render(); },
      bsToggle: (val) => { state.bottomsheet.isOpen = val; render(); },
      bsSelectSize: (size) => { state.bottomsheet.size = state.bottomsheet.size === size ? null : size; checkBsComplete(); },
      bsSelectColor: (color) => { state.bottomsheet.color = state.bottomsheet.color === color ? null : color; checkBsComplete(); },
      bsUpdateQty: (id, delta) => { let item = state.bottomsheet.items.find(i => i.id === id); if(item && item.qty + delta > 0) item.qty += delta; render(); },
      bsRemove: (id) => { state.bottomsheet.items = state.bottomsheet.items.filter(i => i.id !== id); render(); },

      // ----------------------------------------------------
      // [현실 개선안] 바텀시트 아코디언 핸들러
      // ----------------------------------------------------
      accToggle: (val) => { 
        state.accordion.isOpen = val; 
        if(val) {
          // 열릴 때 기본으로 '사이즈' 아코디언을 먼저 열어줌 (사이즈 우선 UX)
          state.accordion.activeDropdown = 'size';
        } else { 
          state.accordion.activeDropdown = null; 
          state.accordion.color = null; 
          state.accordion.size = null; 
        } 
        render(); 
      },
      accToggleDropdown: (type) => { 
        state.accordion.activeDropdown = state.accordion.activeDropdown === type ? null : type; 
        render(); 
      },
      accSelectSize: (size) => {
        // [개선] 1. 사이즈를 먼저 선택하도록 유도
        state.accordion.size = size;
        state.accordion.color = null; // 사이즈 변경 시 색상 리셋
        state.accordion.activeDropdown = 'color'; // 다음 뎁스인 색상 아코디언 자동으로 열기
        render();
      },
      accSelectColor: (color) => {
        // 2. 사이즈 선택 후 색상 선택
        state.accordion.color = color;
        state.accordion.activeDropdown = null; // 선택 완료 시 닫기
        checkAccComplete();
      },
      accUpdateQty: (id, delta) => {
        let item = state.accordion.items.find(i => i.id === id);
        if(item && item.qty + delta > 0) item.qty += delta;
        render();
      },
      accRemove: (id) => {
        state.accordion.items = state.accordion.items.filter(i => i.id !== id);
        render();
      }
    };

    function checkBsComplete() { /* 기존 로직 */ let s = state.bottomsheet; if(s.size && s.color) { const existing = s.items.find(i => i.size === s.size && i.color === s.color); if(existing) existing.qty++; else s.items.push({ id: Date.now(), size: s.size, color: s.color, qty: 1, price: 19900 }); render(); setTimeout(() => { s.size = null; s.color = null; render(); }, 150); } else render(); }

    function checkAccComplete() {
      let s = state.accordion;
      if(s.size && s.color) {
        const existing = s.items.find(i => i.size === s.size && i.color === s.color);
        if(existing) existing.qty++;
        else s.items.push({ id: Date.now(), size: s.size, color: s.color, qty: 1, price: 12000 });

        render();
        setTimeout(() => {
            s.size = null;
            s.color = null;
            s.activeDropdown = null;
            render(); 
        }, 200);
      } else render();
    }

    // --- [3. 렌더링 함수들] ---
    function getGeneralHtml() { return `<div class="p-5 flex items-center justify-center h-40 text-gray-400">일반 옵션 (이전 버전 참조)</div>`; }
    function getSetHtml() { return `<div class="p-5 flex items-center justify-center h-40 text-gray-400">세트 (이전 버전 참조)</div>`; }
    function getTextHtml() { return `<div class="p-5 flex items-center justify-center h-40 text-gray-400">텍스트 옵션 (이전 버전 참조)</div>`; }
    function getSingleHtml() { return `<div class="p-5 flex items-center justify-center h-40 text-gray-400">단일 옵션 (이전 버전 참조)</div>`; }
    function getBottomSheetHtml() { return `<div class="p-5 flex items-center justify-center h-40 text-gray-400">바텀시트 칩 (이전 버전 참조)</div>`; }

    // --------------------------------------------------------------------------------
    // [Case 6] 현실 개선안 아코디언 바텀시트
    // --------------------------------------------------------------------------------
    function getAccordionHtml() {
      const s = state.accordion;
      const d = MOCK_DATA.accordion;

      // [개선 포인트] 가능한 사이즈 목록 추출 (뱃지 노출용)
      const availableSizes = d.sizes.filter(size => d.stockData.some(i => i.size === size && i.stock > 0));

      // 1. 사이즈 리스트 렌더링 (순서 역전: 사이즈 먼저)
      const sizesHtml = d.sizes.map(size => {
        let available = d.stockData.some(i => i.size === size && i.stock > 0);
        return `
          <button ${!available ? 'disabled' : ''} onclick="actions.accSelectSize('${size}')" 
            class="w-full text-left p-3.5 px-5 text-sm border-b border-gray-100 last:border-0 ${!available ? 'text-gray-300' : 'text-gray-800 hover:bg-gray-50'} transition-colors flex justify-between items-center">
            <span>${size} ${!available ? '<span class="text-gray-400 ml-1 text-xs font-normal">[품절]</span>' : ''}</span>
            ${s.size === size ? '<i data-lucide="check" class="w-4 h-4 text-indigo-600"></i>' : ''}
          </button>
        `;
      }).join('');

      // 2. 색상 리스트 렌더링 (선택된 사이즈 기반 필터링 적용)
      const colorsHtml = d.colors.map(color => {
        // 사이즈가 선택된 상태라면, '해당 사이즈'의 해당 색상 재고 확인
        let available = s.size 
            ? d.stockData.some(i => i.color === color.name && i.size === s.size && i.stock > 0) 
            : d.stockData.some(i => i.color === color.name && i.stock > 0);
            
        return `
          <button ${!available ? 'disabled' : ''} onclick="actions.accSelectColor('${color.name}')" 
            class="w-full text-left p-3.5 px-5 text-sm border-b border-gray-100 last:border-0 ${!available ? 'text-gray-300 bg-gray-50/50' : 'text-gray-800 hover:bg-gray-50'} transition-colors flex justify-between items-center">
            <span>
              ${color.name} 
              ${!available && s.size ? `<span class="text-red-400 ml-1 text-xs font-normal">[${s.size}사이즈 품절]</span>` : (!available ? '<span class="text-gray-400 ml-1 text-xs font-normal">[품절]</span>' : '')}
            </span>
            ${s.color === color.name ? '<i data-lucide="check" class="w-4 h-4 text-indigo-600"></i>' : ''}
          </button>
        `;
      }).join('');

      // 선택된 아이템 카드
      const itemsHtml = s.items.map(item => `
        <div class="bg-gray-50/80 rounded-lg p-3 mt-3 flex justify-between items-center border border-gray-200 shadow-sm relative">
          <div class="flex-1">
            <p class="text-[13px] font-bold text-gray-800 mb-1.5">${item.size} / ${item.color}</p>
            <div class="flex items-center border border-gray-300 bg-white rounded overflow-hidden h-7 w-20">
              <button onclick="actions.accUpdateQty(${item.id}, -1)" class="flex-1 flex items-center justify-center text-gray-500 hover:bg-gray-100">-</button>
              <div class="flex-1 flex items-center justify-center text-xs font-bold border-x border-gray-300 h-full">${item.qty}</div>
              <button onclick="actions.accUpdateQty(${item.id}, 1)" class="flex-1 flex items-center justify-center text-gray-500 hover:bg-gray-100">+</button>
            </div>
          </div>
          <div class="text-right">
            <span class="block font-bold text-gray-900 text-sm mt-4">${(item.price * item.qty).toLocaleString()}원</span>
          </div>
          <button onclick="actions.accRemove(${item.id})" class="absolute top-3 right-3 p-1">
             <i data-lucide="x" class="w-4 h-4 text-gray-400"></i>
          </button>
        </div>
      `).join('');

      const totalQty = s.items.reduce((acc, i) => acc + i.qty, 0);
      const totalPrice = s.items.reduce((acc, i) => acc + (i.price * i.qty), 0);

      return `
        <!-- 가상 피드(탐색) 화면 레이아웃 -->
        <div class="p-4 bg-gray-50 h-full flex flex-col gap-4">
          <div class="bg-indigo-50 border border-indigo-200 text-indigo-800 p-3 rounded-xl text-sm shadow-sm">
            <div class="flex gap-2 items-center mb-2">
              <i data-lucide="wrench" class="w-4 h-4 text-indigo-600"></i>
              <strong class="font-bold">제약 내 UI 개선 전략 (아코디언 유지)</strong>
            </div>
            <ul class="text-[11px] space-y-1.5 opacity-90 pl-1">
              <li>1. <strong>[사이즈 뱃지 노출]</strong> 열어보지 않아도 상단 뱃지로 보유 사이즈 즉시 파악</li>
              <li>2. <strong>[순서 역전 UX]</strong> 색상이 아닌 <strong>사이즈</strong>를 무조건 먼저 열어 선택 유도 (유아동복 특화)</li>
              <li>3. <strong>[품절 안내 강화]</strong> 사이즈 선택 후 색상 목록에 "해당 사이즈 품절" 명확히 안내</li>
            </ul>
          </div>

          <!-- 상품 피드 카드 -->
          <div class="relative w-full h-[400px] bg-gray-200 rounded-2xl overflow-hidden shadow-md">
            <img src="https://images.unsplash.com/photo-1519689680058-324335c77eba?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover" />
            
            <button onclick="actions.accToggle(true)" class="absolute bottom-5 right-5 bg-black/80 backdrop-blur-md text-white px-4 py-2.5 rounded-full text-sm font-bold flex items-center gap-2 hover:bg-black transition-all">
              <i data-lucide="shopping-bag" class="w-4 h-4"></i> 장바구니
            </button>
          </div>
        </div>

        <!-- 바텀시트 -->
        ${s.isOpen ? `
          <div class="absolute inset-0 z-50 flex flex-col justify-end pointer-events-none">
            <div class="absolute inset-0 bg-black/60 pointer-events-auto transition-opacity" onclick="actions.accToggle(false)"></div>
            
            <div class="relative bg-white rounded-t-3xl flex flex-col max-h-[85%] pointer-events-auto shadow-2xl overflow-hidden">
              
              <div class="flex justify-between items-center p-5 pb-3">
                <span class="font-extrabold text-gray-900 text-lg tracking-tight">옵션을 확인해 주세요.</span>
                <button onclick="actions.accToggle(false)" class="p-1 -mr-1 text-gray-400">
                  <i data-lucide="x" class="w-6 h-6"></i>
                </button>
              </div>

              <!-- 상품 요약 정보 -->
              <div class="px-5 pb-4 flex gap-3 items-center">
                <div class="w-14 h-14 bg-gray-100 rounded-md overflow-hidden flex-shrink-0 border border-gray-200">
                   <img src="https://images.unsplash.com/photo-1519689680058-324335c77eba?auto=format&fit=crop&q=80&w=100" class="w-full h-full object-cover" />
                </div>
                <div class="flex-1 min-w-0">
                  <p class="text-sm font-medium text-gray-800 truncate mb-1">컴포트 와이드 스트라이프 티셔츠</p>
                  
                  <!-- [개선포인트 1] 아코디언 밖으로 빠진 사이즈 뱃지 -->
                  <div class="flex flex-wrap gap-1 mb-1">
                    <span class="text-[10px] text-gray-500 mr-1 mt-0.5">보유사이즈:</span>
                    ${availableSizes.map(sz => `<span class="bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded text-[10px] font-bold border border-gray-200">${sz}</span>`).join('')}
                  </div>
                  
                  <div class="flex items-center gap-1.5">
                    <span class="text-sm font-bold text-red-500">37%</span>
                    <span class="text-sm font-bold text-gray-900">12,000원</span>
                  </div>
                </div>
              </div>
              
              <div class="w-full h-2 bg-gray-50 border-y border-gray-100"></div>

              <!-- 옵션 선택 아코디언 영역 -->
              <div class="flex-1 overflow-y-auto p-5 pb-32 no-scrollbar bg-white">
                
                <!-- 아코디언 컨테이너 (테두리로 묶인 형태) -->
                <div class="border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                  
                  <!-- [개선포인트 2] 사이즈 선택 아코디언 (순서 맨위로) -->
                  <div>
                    <button onclick="actions.accToggleDropdown('size')" class="w-full p-4 flex justify-between items-center bg-white hover:bg-gray-50 transition-colors">
                      <div class="flex items-center gap-2">
                         <span class="text-[10px] font-bold text-white bg-indigo-500 px-1.5 py-0.5 rounded">필수</span>
                         <span class="text-sm ${s.size ? 'text-gray-900 font-bold' : 'text-gray-600'}">${s.size ? `사이즈 : ${s.size}` : '사이즈 선택'}</span>
                      </div>
                      <i data-lucide="${s.activeDropdown === 'size' ? 'chevron-up' : 'chevron-down'}" class="w-5 h-5 text-gray-400"></i>
                    </button>
                    <div class="accordion-content ${s.activeDropdown === 'size' ? 'open' : ''} bg-white border-t border-gray-100">
                      ${sizesHtml}
                    </div>
                  </div>

                  <!-- 색상 선택 아코디언 -->
                  <div class="border-t border-gray-200">
                    <button onclick="${s.size ? `actions.accToggleDropdown('color')` : `alert('사이즈를 먼저 선택해주세요.')`}" 
                      class="w-full p-4 flex justify-between items-center transition-colors ${!s.size ? 'bg-gray-50/50 opacity-80' : 'bg-white hover:bg-gray-50'}">
                      <div class="flex items-center gap-2">
                         <span class="text-[10px] font-bold text-white ${s.size ? 'bg-indigo-500' : 'bg-gray-300'} px-1.5 py-0.5 rounded">필수</span>
                         <span class="text-sm ${s.color ? 'text-gray-900 font-bold' : (!s.size ? 'text-gray-400' : 'text-gray-600')}">
                           ${s.color ? `색상 : ${s.color}` : (!s.size ? '사이즈를 먼저 선택해주세요' : '색상 선택')}
                         </span>
                      </div>
                      <i data-lucide="${s.activeDropdown === 'color' ? 'chevron-up' : 'chevron-down'}" class="w-5 h-5 ${!s.size ? 'text-gray-300' : 'text-gray-400'}"></i>
                    </button>
                    <div class="accordion-content ${s.activeDropdown === 'color' ? 'open' : ''} bg-white border-t border-gray-100">
                      ${colorsHtml}
                    </div>
                  </div>

                </div>

                <!-- 선택된 아이템 노출 영역 -->
                ${s.items.length > 0 ? `<div class="mt-2 pt-2">${itemsHtml}</div>` : ''}

              </div>

              <!-- 하단 구매 버튼 영역 -->
              <div class="absolute bottom-0 w-full bg-white border-t border-gray-200 p-4 pt-3 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                <div class="flex justify-between items-center mb-3 px-1">
                  <span class="text-xs text-gray-500">총 수량 ${totalQty}개</span>
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium text-gray-800">총 상품금액</span>
                    <span class="text-xl font-bold text-red-500 tracking-tight">${totalPrice.toLocaleString()}<span class="text-base font-normal text-gray-800 ml-0.5">원</span></span>
                  </div>
                </div>
                <div class="flex gap-2">
                  <button ${s.items.length === 0 ? 'disabled' : ''} class="w-14 flex items-center justify-center border border-gray-300 rounded-xl bg-white hover:bg-gray-50 disabled:opacity-50">
                    <i data-lucide="shopping-cart" class="w-5 h-5 text-gray-700"></i>
                  </button>
                  <button ${s.items.length === 0 ? 'disabled' : ''} class="flex-1 py-3.5 text-white font-bold rounded-xl transition-all ${s.items.length === 0 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gray-900 hover:bg-black'}">
                    바로 구매하기
                  </button>
                </div>
              </div>

            </div>
          </div>
        ` : ''}
      `;
    }

    function render() {
      const root = document.getElementById('root');
      
      const tabButtonsHtml = TABS.map(tab => `
        <button onclick="actions.setTab('${tab.id}')" class="px-2.5 py-1.5 text-[11px] rounded-full font-medium transition-colors ${state.activeTab === tab.id ? 'bg-indigo-500 text-white shadow-sm' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}">
          ${tab.label}
        </button>
      `).join('');

      let contentAreaHtml = state.activeTab === 'accordion' ? getAccordionHtml() : '<div class="p-10 text-center text-gray-400">다른 탭 코드는 생략되었습니다.</div>';

      root.innerHTML = `
        <div class="min-h-screen py-8 px-4 flex justify-center font-sans">
          <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden relative flex flex-col h-[850px]">
            <div class="bg-slate-800 text-white p-4">
              <h2 class="text-sm font-bold mb-3 text-slate-300">UI/UX 테스트 케이스 선택</h2>
              <div class="flex flex-wrap gap-2">${tabButtonsHtml}</div>
            </div>
            <div class="flex-1 overflow-y-auto no-scrollbar relative">
              ${contentAreaHtml}
            </div>
          </div>
        </div>
      `;

      if (window.lucide) window.lucide.createIcons();
    }

    document.addEventListener('DOMContentLoaded', () => { render(); });
  </script>
</body>
</html>
