<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전사 UX 라이팅 봇</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>

  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { font-family: 'Pretendard', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Bot, Copy, CheckCircle2, Loader2, Sparkles, MessageSquare, AlertCircle, Type, Edit3, AlertTriangle, Wand2, CornerDownRight, Send, Key } from 'lucide-react';

    function App() {
      // API 키 상태 관리 (로컬 스토리지에 저장하여 새로고침해도 유지됨)
      const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
      const [showApiKeyInput, setShowApiKeyInput] = useState(!localStorage.getItem('gemini_api_key'));

      const [usageType, setUsageType] = useState('push');
      const [customUsage, setCustomUsage] = useState('');
      const [tone, setTone] = useState('friendly');
      const [coreMessage, setCoreMessage] = useState('');
      const [isGenerating, setIsGenerating] = useState(false);
      const [results, setResults] = useState(null);
      const [copiedIndex, setCopiedIndex] = useState(null);
      const [errorMsg, setErrorMsg] = useState(null);

      const [activeRefineIndex, setActiveRefineIndex] = useState(null);
      const [refinePrompt, setRefinePrompt] = useState('');
      const [isRefiningIndex, setIsRefiningIndex] = useState(null);

      const usageLabels = {
        push: '앱 푸시/알림',
        error: '에러/경고창',
        tooltip: '툴팁/안내',
        other: '기타 (직접 입력)'
      };

      const toneLabels = {
        friendly: '친근하고 부드럽게',
        polite: '정중하고 신뢰감 있게',
        clear: '건조하지만 명확하게'
      };

      // API 키 저장 핸들러
      const handleSaveApiKey = (e) => {
        const val = e.target.value;
        setApiKey(val);
        localStorage.setItem('gemini_api_key', val);
      };

      const fetchWithRetry = async (url, options, retries = 3) => {
        const delays = [1000, 2000, 4000];
        for (let i = 0; i < retries; i++) {
          try {
            const response = await fetch(url, options);
            if (!response.ok) {
                if(response.status === 400) throw new Error('API 키가 올바르지 않거나 권한이 없습니다.');
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return await response.json();
          } catch (err) {
            if (i === retries - 1) throw err;
            await new Promise(res => setTimeout(res, delays[i]));
          }
        }
      };

      const generateAIResults = async () => {
        if (!apiKey.trim()) {
          setErrorMsg('우측 상단에 Gemini API 키를 먼저 입력해주세요.');
          setShowApiKeyInput(true);
          return;
        }
        if (coreMessage.trim() === '') return;
        if (usageType === 'other' && customUsage.trim() === '') {
          setErrorMsg('기타 사용처를 입력해주세요.');
          return;
        }

        setIsGenerating(true);
        setResults(null);
        setErrorMsg(null);

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey.trim()}`;
        const actualUsage = usageType === 'other' ? customUsage : usageLabels[usageType];
        const actualTone = toneLabels[tone];

        const systemInstruction = `너는 10년 차 IT 기업의 수석 UX 라이터야. 
        사용자가 상황을 주면 아래의 원칙에 따라 최적의 UI/UX 문구를 3가지 다른 옵션으로 제안해 줘.
        [작성 원칙]
        1. 명확성: 전문 용어나 시스템 언어를 배제하고 중학생도 이해할 수 있는 쉬운 단어를 쓴다.
        2. 간결성: 불필요한 조사와 수식어를 빼고 목적만 짧게 전달한다.
        3. 긍정성: 유저의 잘못을 지적하지 않고, 해결 방법을 안내한다.`;

        const prompt = `다음 상황에 맞는 UX 문구를 작성해주세요.
        - 사용처: ${actualUsage}
        - 톤앤매너: ${actualTone}
        - 전달할 핵심 내용: ${coreMessage}`;

        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          systemInstruction: { parts: [{ text: systemInstruction }] },
          generationConfig: {
            responseMimeType: "application/json",
            responseSchema: {
              type: "ARRAY",
              items: {
                type: "OBJECT",
                properties: {
                  title: { type: "STRING", description: "옵션 이름 (예: A. 직관성 위주)" },
                  text: { type: "STRING", description: "작성된 UX 라이팅 문구" },
                  reason: { type: "STRING", description: "이 문구를 추천하는 이유 (1~2줄)" }
                },
                required: ["title", "text", "reason"]
              }
            }
          }
        };

        try {
          const data = await fetchWithRetry(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (responseText) {
            const parsedResults = JSON.parse(responseText);
            setResults(parsedResults);
          } else {
            throw new Error('응답 결과가 없습니다.');
          }
        } catch (error) {
          console.error('Generation Error:', error);
          setErrorMsg(error.message || 'AI 응답을 가져오는 중 문제가 발생했습니다.');
        } finally {
          setIsGenerating(false);
        }
      };

      const refineAIResult = async (index, currentText) => {
        if (!apiKey.trim() || refinePrompt.trim() === '') return;

        setIsRefiningIndex(index);
        setErrorMsg(null);

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey.trim()}`;

        const systemInstruction = `너는 10년 차 IT 기업의 수석 UX 라이터야. 
        기존에 작성된 UX 라이팅 문구를 사용자의 추가 요청에 맞게 다듬어줘.`;

        const prompt = `[기존 문구]
        ${currentText}

        [추가 요청]
        ${refinePrompt}

        위 요청을 반영하여 기존 문구를 새롭게 다듬어서 1개만 제안해 줘. 기존 문구의 좋은 점은 유지하되 추가 요청사항을 최우선으로 반영해.`;

        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          systemInstruction: { parts: [{ text: systemInstruction }] },
          generationConfig: {
            responseMimeType: "application/json",
            responseSchema: {
              type: "OBJECT",
              properties: {
                text: { type: "STRING", description: "수정된 UX 라이팅 문구" },
                reason: { type: "STRING", description: "수정한 이유 (1~2줄)" }
              },
              required: ["text", "reason"]
            }
          }
        };

        try {
          const data = await fetchWithRetry(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (responseText) {
            const parsedResult = JSON.parse(responseText);
            setResults(prevResults => {
              const newResults = [...prevResults];
              newResults[index] = { ...newResults[index], text: parsedResult.text, reason: parsedResult.reason };
              return newResults;
            });
            setActiveRefineIndex(null);
            setRefinePrompt('');
          } else {
            throw new Error('응답 결과가 없습니다.');
          }
        } catch (error) {
          console.error('Refine Error:', error);
          setErrorMsg('추가 다듬기 중 문제가 발생했습니다.');
        } finally {
          setIsRefiningIndex(null);
        }
      };

      const copyToClipboard = (text, index) => {
        try {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          textArea.style.position = "fixed";
          textArea.style.left = "-999999px";
          textArea.style.top = "-999999px";
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          document.execCommand('copy');
          textArea.remove();
          
          setCopiedIndex(index);
          setTimeout(() => setCopiedIndex(null), 2000);
        } catch (error) {
          setErrorMsg('클립보드 복사에 실패했습니다.');
        }
      };

      return (
        <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans text-gray-800">
          <header className="max-w-5xl mx-auto mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div className="flex items-center gap-3">
              <div className="bg-blue-600 p-2.5 rounded-xl text-white shadow-sm">
                <Bot size={28} />
              </div>
              <div>
                <h1 className="text-2xl font-bold text-gray-900 tracking-tight">전사 UX 라이팅 봇</h1>
                <p className="text-sm text-gray-500 mt-1">기획, 디자인, 개발 누구나 쓰는 우리 회사 브랜드 보이스</p>
              </div>
            </div>
            
            {/* 안전한 API 키 입력 UI */}
            <div className="flex items-center gap-2 bg-white p-2 rounded-xl border border-gray-200 shadow-sm">
              <Key size={16} className="text-gray-400 ml-2" />
              {showApiKeyInput ? (
                <input 
                  type="password" 
                  value={apiKey}
                  onChange={handleSaveApiKey}
                  placeholder="Gemini API 키 입력 (AIza...)" 
                  className="px-2 py-1 text-sm outline-none w-48 focus:bg-blue-50 rounded"
                />
              ) : (
                <span className="text-sm text-gray-500 px-2 font-medium">API 키 저장됨 (안전)</span>
              )}
              <button 
                onClick={() => setShowApiKeyInput(!showApiKeyInput)}
                className="text-xs text-blue-600 font-medium px-2 py-1 hover:bg-blue-50 rounded transition-colors"
              >
                {showApiKeyInput ? '완료' : '변경'}
              </button>
            </div>
          </header>

          <main className="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
            {/* 왼쪽 패널 */}
            <section className="lg:col-span-5 bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col h-fit">
              <h2 className="text-lg font-semibold mb-6 flex items-center gap-2">
                <MessageSquare size={20} className="text-blue-500" /> 무엇을 도와드릴까요?
              </h2>

              <div className="space-y-6">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-3">1. 어디에 쓰이는 문구인가요?</label>
                  <div className="grid grid-cols-2 gap-2">
                    {[
                      { id: 'push', label: '앱 푸시/알림', icon: <Sparkles size={16} /> },
                      { id: 'error', label: '에러/경고창', icon: <AlertCircle size={16} /> },
                      { id: 'tooltip', label: '툴팁/안내', icon: <Type size={16} /> },
                      { id: 'other', label: '기타', icon: <Edit3 size={16} /> },
                    ].map((item) => (
                      <button
                        key={item.id}
                        onClick={() => { setUsageType(item.id); if (item.id !== 'other') setCustomUsage(''); }}
                        className={`flex items-center gap-2 p-3 text-sm rounded-xl border transition-all ${usageType === item.id ? 'border-blue-500 bg-blue-50 text-blue-700 font-medium' : 'border-gray-200 hover:bg-gray-50 text-gray-600'}`}
                      >
                        {item.icon} {item.label}
                      </button>
                    ))}
                  </div>
                  {usageType === 'other' && (
                    <div className="mt-3"><input type="text" value={customUsage} onChange={(e) => setCustomUsage(e.target.value)} placeholder="어떤 화면/상황에서 쓰이나요?" className="w-full p-3 border border-gray-300 rounded-xl bg-white outline-none text-sm" autoFocus /></div>
                  )}
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-3">2. 어떤 톤앤매너를 원하시나요?</label>
                  <div className="flex flex-wrap gap-2">
                    {[{ id: 'friendly', label: '친근하고 부드럽게' }, { id: 'polite', label: '정중하고 신뢰감 있게' }, { id: 'clear', label: '건조하지만 명확하게' }].map((t) => (
                      <button key={t.id} onClick={() => setTone(t.id)} className={`px-4 py-2 text-sm rounded-full border transition-all ${tone === t.id ? 'border-blue-500 bg-blue-50 text-blue-700 font-medium' : 'border-gray-200 hover:bg-gray-50 text-gray-600'}`}>{t.label}</button>
                    ))}
                  </div>
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">3. 유저에게 꼭 전달해야 할 핵심 내용</label>
                  <textarea value={coreMessage} onChange={(e) => setCoreMessage(e.target.value)} placeholder="예) 결제 시도 중 카드 잔액이 부족해서 실패했음..." className="w-full p-4 border border-gray-200 rounded-xl bg-gray-50 outline-none resize-none h-32 text-sm"></textarea>
                </div>

                {errorMsg && (
                  <div className="p-3 bg-red-50 text-red-600 text-sm rounded-xl flex gap-2 items-start"><AlertTriangle size={16} className="shrink-0 mt-0.5" /> <span>{errorMsg}</span></div>
                )}

                <button onClick={generateAIResults} disabled={isGenerating || coreMessage.trim() === ''} className={`w-full py-4 rounded-xl font-bold text-white flex justify-center items-center gap-2 transition-all ${isGenerating || coreMessage.trim() === '' ? 'bg-blue-300 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 hover:shadow-lg'}`}>
                  {isGenerating ? <><Loader2 size={20} className="animate-spin" /> AI가 작성 중...</> : <><Sparkles size={20} /> UX 문구 생성하기</>}
                </button>
              </div>
            </section>

            {/* 오른쪽 패널 */}
            <section className="lg:col-span-7 bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col overflow-hidden min-h-[500px]">
              <div className="p-6 border-b border-gray-100 bg-gray-50/50">
                <h2 className="text-lg font-semibold text-gray-800">AI 제안 결과</h2>
                <p className="text-sm text-gray-500 mt-1">입력된 상황과 톤앤매너에 맞춘 3가지 옵션입니다.</p>
              </div>

              <div className="p-6 flex-1 bg-slate-50 overflow-y-auto">
                {!results && !isGenerating && (
                  <div className="h-full flex flex-col items-center justify-center text-gray-400 space-y-4 py-12"><Bot size={48} className="opacity-20" /><p>좌측 폼을 작성하고 생성 버튼을 눌러주세요.</p></div>
                )}
                {isGenerating && (
                  <div className="h-full flex flex-col items-center justify-center text-blue-500 space-y-4 py-12"><Loader2 size={40} className="animate-spin" /><p className="font-medium animate-pulse">상황을 분석하고 문구를 작성하고 있습니다...</p></div>
                )}
                {results && !isGenerating && (
                  <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    {results.map((result, index) => (
                      <div key={index} className="bg-white border border-gray-200 rounded-xl p-5 relative group">
                        <div className="flex justify-between items-start mb-2">
                          <span className="px-3 py-1 bg-blue-50 text-blue-700 text-xs font-bold rounded-lg">{result.title}</span>
                          <button onClick={() => copyToClipboard(result.text, index)} className="text-gray-400 hover:text-blue-600 p-1 flex items-center gap-1 text-sm bg-gray-50 rounded-md">
                            {copiedIndex === index ? <><CheckCircle2 size={16} className="text-green-500"/> <span className="text-green-600">복사됨!</span></> : <><Copy size={16} /> <span>복사</span></>}
                          </button>
                        </div>
                        <p className="text-lg text-gray-900 font-medium py-3 whitespace-pre-line">{result.text}</p>
                        <div className="mt-2 pt-3 border-t border-gray-100 flex gap-2"><Sparkles size={14} className="text-amber-500 mt-0.5 shrink-0" /><p className="text-sm text-gray-500"><strong className="text-gray-700">추천 이유: </strong> {result.reason}</p></div>
                        
                        <div className="mt-4 pt-3 border-t border-dashed border-gray-200">
                          {activeRefineIndex !== index ? (
                            <button onClick={() => { setActiveRefineIndex(index); setRefinePrompt(''); }} className="flex items-center gap-1.5 text-sm text-gray-500 hover:text-blue-600"><Wand2 size={14} /><span>이 문구 다듬기</span></button>
                          ) : (
                            <div className="flex items-center gap-2">
                              <CornerDownRight size={16} className="text-gray-400" />
                              <input type="text" value={refinePrompt} onChange={(e) => setRefinePrompt(e.target.value)} placeholder="예) 좀 더 길게 만들어줘" className="flex-1 p-2 text-sm border border-gray-200 rounded-lg bg-gray-50 outline-none" onKeyDown={(e) => e.key === 'Enter' && refineAIResult(index, result.text)} autoFocus />
                              <button onClick={() => refineAIResult(index, result.text)} disabled={isRefiningIndex === index || !refinePrompt.trim()} className="p-2 rounded-lg bg-blue-600 text-white disabled:bg-gray-200">{isRefiningIndex === index ? <Loader2 size={16} className="animate-spin" /> : <Send size={16} />}</button>
                              <button onClick={() => setActiveRefineIndex(null)} className="text-xs text-gray-500 hover:text-gray-700">취소</button>
                            </div>
                          )}
                        </div>
                        {isRefiningIndex === index && <div className="absolute inset-0 bg-white/70 backdrop-blur-[1px] rounded-xl flex items-center justify-center z-10"><Loader2 size={28} className="animate-spin text-blue-600" /></div>}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </section>
          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
